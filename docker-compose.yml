services:
  cassandra-node1:
    image: cassandra:4.1
    container_name: cass-node1
    environment:
      - CASSANDRA_CLUSTER_NAME=SimCluster
      - CASSANDRA_SEEDS=cass-node1,cass-node4
      - CASSANDRA_DC=dc1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - HEAP_NEWSIZE=128M
      - MAX_HEAP_SIZE=512M
    ports:
      - "9042:9042"
    networks:
      - cassandra-net
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 90s

  cassandra-node2:
    image: cassandra:4.1
    container_name: cass-node2
    environment:
      - CASSANDRA_CLUSTER_NAME=SimCluster
      - CASSANDRA_SEEDS=cass-node1,cass-node4
