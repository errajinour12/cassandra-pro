  # ── Backend FastAPI ─────────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: simcassandra-backend
    ports:
      - "8000:8000"
    environment:
      - CASSANDRA_HOST=cass-node1
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      cassandra-node1:
        condition: service_healthy
    networks:
      - cassandra-net
    restart: on-failure

networks:
  cassandra-net:
    driver: bridge
